name: Update Node.js Versions

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      commit_sha: ${{ steps.commit.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          set_as_trusted_user: true
          nix_path: nixpkgs=channel:nixos-unstable

      - run: nix profile add nixpkgs#nix-prefetch-git nixpkgs#jq

      - name: Discover and add new Node.js versions
        run: ./scripts/fetch-node-versions.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes if versions.json changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to versions.json."
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update Node.js versions [skip ci]"
            git push
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

  generate-matrix:
    runs-on: ubuntu-latest
    needs: [update]
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update.outputs.commit_sha }}
      - id: set-matrix
        run: |
          JSON=$(jq -c '.versions | keys' versions.json)
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ${{ matrix.runner.os }}
    needs: [generate-matrix, update]
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
        runner:
          - { system: aarch64-darwin, os: macos-latest }
          - { system: x86_64-linux, os: ubuntu-latest }

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.update.outputs.commit_sha }}

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
          set_as_trusted_user: true
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v16
        with:
          name: nixpkgs-nodejs
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          pushFilter: "(-source$|-src$|\\.tar\\.gz$|\\.tar\\.bz2$|\\.tar\\.xz$|\\.zip$)"
          useDaemon: true

      - name: Build ${{ matrix.version }}
        run: |
          TARGET_SYSTEM=${{ matrix.runner.system }}
          echo "Building ${{ matrix.version }} for $TARGET_SYSTEM..."
          cachix watch-exec nixpkgs-nodejs -- \
            nix build .#packages.$TARGET_SYSTEM.\"${{ matrix.version }}\" -L --accept-flake-config

      - name: Verify Build Path
        run: |
          TARGET_SYSTEM=${{ matrix.runner.system }}
          OUT_PATH=$(nix path-info .#packages.$TARGET_SYSTEM.\"${{ matrix.version }}\" --accept-flake-config)
          echo "Built package at: $OUT_PATH"
          nix path-info "$OUT_PATH" > /dev/null
